<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="#111827"/>
  <!-- Mat grid lines -->
  <rect x="60" y="60" width="392" height="392" rx="12" fill="#1f2937"/>
  <line x1="60" y1="191" x2="452" y2="191" stroke="#374151" stroke-width="2"/>
  <line x1="60" y1="321" x2="452" y2="321" stroke="#374151" stroke-width="2"/>
  <line x1="191" y1="60" x2="191" y2="452" stroke="#374151" stroke-width="2"/>
  <line x1="321" y1="60" x2="321" y2="452" stroke="#374151" stroke-width="2"/>
  <!-- Belt stripe accent -->
  <rect x="60" y="230" width="392" height="52" fill="#dc2626" opacity="0.85"/>
  <!-- M A T S letters -->
  <text x="256" y="275" font-family="Arial Black, sans-serif" font-size="52" font-weight="900" fill="white" text-anchor="middle" dominant-baseline="middle" letter-spacing="8">MATS</text>
